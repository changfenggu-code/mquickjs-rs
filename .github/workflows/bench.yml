name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BENCH_RUNS: 15

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Build release
        run: cargo build --release

      - name: Locate and build C implementation
        shell: bash
        run: |
          set -euo pipefail
          C_BIN=""

          try_bin() {
            local bin="$1"
            if [ -x "$bin" ] && "$bin" -e "0" > /dev/null 2>&1; then
              C_BIN="$bin"
            fi
          }

          try_bin "contrib/mquickjs/bin/mqjs"
          if [ -z "$C_BIN" ]; then
            try_bin "contrib/mquickjs/mqjs"
          fi
          if [ -z "$C_BIN" ] && [ -f contrib/mquickjs/mquickjs.c ]; then
            echo "C source found but no runnable binary; building..."
            make -C contrib/mquickjs -j"$(nproc 2>/dev/null || echo 4)" mqjs
            try_bin "contrib/mquickjs/bin/mqjs"
            if [ -z "$C_BIN" ]; then
              try_bin "contrib/mquickjs/mqjs"
            fi
          fi

          if [ -n "$C_BIN" ]; then
            echo "Using C benchmark binary: $C_BIN"
            echo "C_BIN=$C_BIN" >> "$GITHUB_ENV"
          else
            echo "Warning: no runnable C binary found; Rust-only mode."
            echo "C_BIN=" >> "$GITHUB_ENV"
          fi

      - name: Run benchmark comparison
        shell: bash
        run: |
          set -euo pipefail
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          rust_start_total=0
          for i in $(seq 1 "$BENCH_RUNS"); do
            start=$(python3 -c 'import time; print(time.time())')
            ./target/release/mqjs -e "0" > /dev/null 2>&1 || true
            end=$(python3 -c 'import time; print(time.time())')
            elapsed=$(python3 -c "print($end - $start)")
            rust_start_total=$(python3 -c "print($rust_start_total + $elapsed)")
          done
          rust_start=$(python3 -c "print(f'{$rust_start_total / $BENCH_RUNS:.4f}')")

          if [ -n "${C_BIN:-}" ]; then
            c_start_total=0
            for i in $(seq 1 "$BENCH_RUNS"); do
              start=$(python3 -c 'import time; print(time.time())')
              "$C_BIN" -e "0" > /dev/null 2>&1 || true
              end=$(python3 -c 'import time; print(time.time())')
              elapsed=$(python3 -c "print($end - $start)")
              c_start_total=$(python3 -c "print($c_start_total + $elapsed)")
            done
            c_start=$(python3 -c "print(f'{$c_start_total / $BENCH_RUNS:.4f}')")
          fi

          if [ -n "${C_BIN:-}" ]; then
            echo "| Benchmark | Rust (s) | C (s) | Ratio | Notes |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|----------|-------|-------|-------|" >> $GITHUB_STEP_SUMMARY
            start_ratio=$(python3 -c "r=$rust_start; c=$c_start; print(f'{r/c:.2f}' if c > 0 else 'N/A')")
            echo "| startup_baseline | $rust_start | $c_start | ${start_ratio}x | process startup |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Benchmark | Rust (s) | Notes |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| startup_baseline | $rust_start | process startup |" >> $GITHUB_STEP_SUMMARY
          fi

          for script in benches/scripts/*.js; do
            name=$(basename "$script" .js)

            # Run Rust version (${BENCH_RUNS} runs, take average)
            rust_total=0
            for i in $(seq 1 "$BENCH_RUNS"); do
              start=$(python3 -c 'import time; print(time.time())')
              ./target/release/mqjs "$script" > /dev/null 2>&1 || true
              end=$(python3 -c 'import time; print(time.time())')
              elapsed=$(python3 -c "print($end - $start)")
              rust_total=$(python3 -c "print($rust_total + $elapsed)")
            done
            rust_time=$(python3 -c "print(f'{$rust_total / $BENCH_RUNS:.4f}')")

            if [ -n "${C_BIN:-}" ]; then
              # Run C version (${BENCH_RUNS} runs, take average)
              c_total=0
              for i in $(seq 1 "$BENCH_RUNS"); do
                start=$(python3 -c 'import time; print(time.time())')
                "$C_BIN" "$script" > /dev/null 2>&1 || true
                end=$(python3 -c 'import time; print(time.time())')
                elapsed=$(python3 -c "print($end - $start)")
                c_total=$(python3 -c "print($c_total + $elapsed)")
              done
              c_time=$(python3 -c "print(f'{$c_total / $BENCH_RUNS:.4f}')")

              # Calculate ratio and notes
              ratio=$(python3 -c "r=$rust_time; c=$c_time; print(f'{r/c:.2f}' if c > 0 else 'N/A')")
              notes=$(python3 -c "r=$rust_time; c=$c_time; ratio=r/c if c>0 else 0; print('Rust faster' if ratio<0.9 else ('C faster' if ratio>1.1 else 'Equal'))")

              echo "| $name | $rust_time | $c_time | ${ratio}x | $notes |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | $rust_time | Rust-only |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Benchmarks run on GitHub Actions runner (Ubuntu)_" >> $GITHUB_STEP_SUMMARY

      - name: Run Criterion benchmarks
        shell: bash
        run: |
          set -euo pipefail
          cargo bench --bench js_benchmarks > criterion_output.txt 2>&1 || true

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Criterion Analysis (Rust-only, Ubuntu)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Benchmark | Criterion Time |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------------|" >> $GITHUB_STEP_SUMMARY

          grep "time:" criterion_output.txt | while IFS= read -r line; do
            name=$(echo "$line" | sed -E 's/[[:space:]]+time:.*$//' | sed -E 's/[[:space:]]+$//')
            time=$(echo "$line" | sed -E 's/^.*time:[[:space:]]+//')
            echo "| $name | $time |" >> $GITHUB_STEP_SUMMARY
          done || true

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Criterion table is intended for detailed Rust-side analysis on a stable runner; Rust-vs-C table above is the cross-implementation comparison view._" >> $GITHUB_STEP_SUMMARY

  benchmark-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Locate and build C implementation
        shell: bash
        run: |
          set -euo pipefail
          C_BIN=""

          try_bin() {
            local bin="$1"
            if [ -x "$bin" ] && "$bin" -e "0" > /dev/null 2>&1; then
              C_BIN="$bin"
            fi
          }

          try_bin "contrib/mquickjs/bin/mqjs"
          if [ -z "$C_BIN" ]; then
            try_bin "contrib/mquickjs/mqjs"
          fi
          if [ -z "$C_BIN" ] && [ -f contrib/mquickjs/mquickjs.c ]; then
            echo "C source found but no runnable binary; building..."
            make -C contrib/mquickjs mqjs
            try_bin "contrib/mquickjs/bin/mqjs"
            if [ -z "$C_BIN" ]; then
              try_bin "contrib/mquickjs/mqjs"
            fi
          fi

          if [ -n "$C_BIN" ]; then
            echo "Using C benchmark binary: $C_BIN"
            echo "C_BIN=$C_BIN" >> "$GITHUB_ENV"
          else
            echo "Warning: no runnable C binary found; Rust-only mode."
            echo "C_BIN=" >> "$GITHUB_ENV"
          fi

      - name: Run benchmark comparison
        shell: bash
        run: |
          set -euo pipefail
          echo "## Benchmark Results (macOS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "${C_BIN:-}" ]; then
            echo "| Benchmark | Rust (s) | C (s) | Ratio |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|----------|-------|-------|" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Benchmark | Rust (s) | Notes |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|----------|-------|" >> $GITHUB_STEP_SUMMARY
          fi

          for script in benches/scripts/*.js; do
            name=$(basename "$script" .js)

            # Run Rust version (${BENCH_RUNS} runs)
            rust_total=0
            for i in $(seq 1 "$BENCH_RUNS"); do
              start=$(python3 -c 'import time; print(time.time())')
              ./target/release/mqjs "$script" > /dev/null 2>&1 || true
              end=$(python3 -c 'import time; print(time.time())')
              elapsed=$(python3 -c "print($end - $start)")
              rust_total=$(python3 -c "print($rust_total + $elapsed)")
            done
            rust_time=$(python3 -c "print(f'{$rust_total / $BENCH_RUNS:.4f}')")

            if [ -n "${C_BIN:-}" ]; then
              c_total=0
              for i in $(seq 1 "$BENCH_RUNS"); do
                start=$(python3 -c 'import time; print(time.time())')
                "$C_BIN" "$script" > /dev/null 2>&1 || true
                end=$(python3 -c 'import time; print(time.time())')
                elapsed=$(python3 -c "print($end - $start)")
                c_total=$(python3 -c "print($c_total + $elapsed)")
              done
              c_time=$(python3 -c "print(f'{$c_total / $BENCH_RUNS:.4f}')")
              ratio=$(python3 -c "print(f'{$rust_time / $c_time:.2f}x' if $c_time > 0 else 'N/A')")
              echo "| $name | $rust_time | $c_time | $ratio |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | $rust_time | Rust-only |" >> $GITHUB_STEP_SUMMARY
            fi
          done
