name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BENCH_RUNS: 15

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Build release
        run: cargo build --release

      - name: Locate and build C implementation
        shell: bash
        run: |
          set -euo pipefail
          C_BIN=""

          if [ -x vendor/mquickjs/bin/mqjs ]; then
            C_BIN="vendor/mquickjs/bin/mqjs"
          elif [ -x vendor/mquickjs/mqjs ]; then
            C_BIN="vendor/mquickjs/mqjs"
          elif [ -f vendor/mquickjs/mquickjs.c ]; then
            echo "C source found but no mqjs binary; building..."
            make -C vendor/mquickjs -j"$(nproc 2>/dev/null || echo 4)" mqjs
            if [ -x vendor/mquickjs/bin/mqjs ]; then
              C_BIN="vendor/mquickjs/bin/mqjs"
            elif [ -x vendor/mquickjs/mqjs ]; then
              C_BIN="vendor/mquickjs/mqjs"
            fi
          fi

          if [ -n "$C_BIN" ]; then
            echo "Using C benchmark binary: $C_BIN"
            echo "C_BIN=$C_BIN" >> "$GITHUB_ENV"
          else
            echo "Warning: C benchmark binary not found; Rust-only benchmark summary will be generated."
            echo "C_BIN=" >> "$GITHUB_ENV"
          fi

      - name: Run benchmark comparison
        shell: bash
        run: |
          set -euo pipefail
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          rust_start_total=0
          for i in $(seq 1 "$BENCH_RUNS"); do
            start=$(date +%s.%N)
            ./target/release/mqjs -e "0" > /dev/null 2>&1
            end=$(date +%s.%N)
            elapsed=$(echo "$end - $start" | bc)
            rust_start_total=$(echo "$rust_start_total + $elapsed" | bc)
          done
          rust_start=$(echo "scale=4; $rust_start_total / $BENCH_RUNS" | bc)

          if [ -n "${C_BIN:-}" ]; then
            c_start_total=0
            for i in $(seq 1 "$BENCH_RUNS"); do
              start=$(date +%s.%N)
              "$C_BIN" -e "0" > /dev/null 2>&1
              end=$(date +%s.%N)
              elapsed=$(echo "$end - $start" | bc)
              c_start_total=$(echo "$c_start_total + $elapsed" | bc)
            done
            c_start=$(echo "scale=4; $c_start_total / $BENCH_RUNS" | bc)
          fi

          if [ -n "${C_BIN:-}" ]; then
            echo "| Benchmark | Rust (s) | C (s) | Ratio | Notes |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|----------|-------|-------|-------|" >> $GITHUB_STEP_SUMMARY
            start_ratio=$(printf "%.2f" "$(echo "scale=4; $rust_start / $c_start" | bc)" 2>/dev/null || echo "N/A")
            echo "| startup_baseline | $rust_start | $c_start | ${start_ratio}x | process startup |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Benchmark | Rust (s) | Notes |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| startup_baseline | $rust_start | process startup |" >> $GITHUB_STEP_SUMMARY
          fi

          for script in benches/scripts/*.js; do
            name=$(basename "$script" .js)

            # Run Rust version (${BENCH_RUNS} runs, take average)
            rust_total=0
            for i in $(seq 1 "$BENCH_RUNS"); do
              start=$(date +%s.%N)
              ./target/release/mqjs "$script" > /dev/null 2>&1
              end=$(date +%s.%N)
              elapsed=$(echo "$end - $start" | bc)
              rust_total=$(echo "$rust_total + $elapsed" | bc)
            done
            rust_time=$(echo "scale=4; $rust_total / $BENCH_RUNS" | bc)

            if [ -n "${C_BIN:-}" ]; then
              # Run C version (${BENCH_RUNS} runs, take average)
              c_total=0
              for i in $(seq 1 "$BENCH_RUNS"); do
                start=$(date +%s.%N)
                "$C_BIN" "$script" > /dev/null 2>&1
                end=$(date +%s.%N)
                elapsed=$(echo "$end - $start" | bc)
                c_total=$(echo "$c_total + $elapsed" | bc)
              done
              c_time=$(echo "scale=4; $c_total / $BENCH_RUNS" | bc)

              # Calculate ratio
              raw_ratio=$(echo "scale=2; $rust_time / $c_time" | bc)
              ratio=$(printf "%.2f" "$raw_ratio" 2>/dev/null || echo "0$raw_ratio")

              # Determine notes
              if (( $(echo "$ratio < 0.9" | bc -l) )); then
                notes="Rust faster"
              elif (( $(echo "$ratio > 1.1" | bc -l) )); then
                notes="C faster"
              else
                notes="Equal"
              fi

              echo "| $name | $rust_time | $c_time | ${ratio}x | $notes |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | $rust_time | Rust-only |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Benchmarks run on GitHub Actions runner (Ubuntu)_" >> $GITHUB_STEP_SUMMARY

      - name: Run Criterion benchmarks
        shell: bash
        run: |
          set -euo pipefail
          cargo bench --bench js_benchmarks > criterion_output.txt 2>&1

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Criterion Analysis (Rust-only, Ubuntu)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Benchmark | Criterion Time |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------------|" >> $GITHUB_STEP_SUMMARY

          grep "time:" criterion_output.txt | while IFS= read -r line; do
            name=$(echo "$line" | sed -E 's/[[:space:]]+time:.*$//' | sed -E 's/[[:space:]]+$//')
            time=$(echo "$line" | sed -E 's/^.*time:[[:space:]]+//')
            echo "| $name | $time |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Criterion table is intended for detailed Rust-side analysis on a stable runner; Rust-vs-C table above is the cross-implementation comparison view._" >> $GITHUB_STEP_SUMMARY

  benchmark-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Locate and build C implementation
        shell: bash
        run: |
          set -euo pipefail
          C_BIN=""

          if [ -x vendor/mquickjs/bin/mqjs ]; then
            C_BIN="vendor/mquickjs/bin/mqjs"
          elif [ -x vendor/mquickjs/mqjs ]; then
            C_BIN="vendor/mquickjs/mqjs"
          elif [ -f vendor/mquickjs/mquickjs.c ]; then
            echo "C source found but no mqjs binary; building..."
            make -C vendor/mquickjs mqjs
            if [ -x vendor/mquickjs/bin/mqjs ]; then
              C_BIN="vendor/mquickjs/bin/mqjs"
            elif [ -x vendor/mquickjs/mqjs ]; then
              C_BIN="vendor/mquickjs/mqjs"
            fi
          fi

          if [ -n "$C_BIN" ]; then
            echo "Using C benchmark binary: $C_BIN"
            echo "C_BIN=$C_BIN" >> "$GITHUB_ENV"
          else
            echo "Warning: C benchmark binary not found; Rust-only benchmark summary will be generated."
            echo "C_BIN=" >> "$GITHUB_ENV"
          fi

      - name: Run benchmark comparison
        shell: bash
        run: |
          set -euo pipefail
          echo "## Benchmark Results (macOS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "${C_BIN:-}" ]; then
            echo "| Benchmark | Rust (s) | C (s) | Ratio |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|----------|-------|-------|" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Benchmark | Rust (s) | Notes |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|----------|-------|" >> $GITHUB_STEP_SUMMARY
          fi

          for script in benches/scripts/*.js; do
            name=$(basename "$script" .js)

            # Run Rust version (${BENCH_RUNS} runs)
            rust_total=0
            for i in $(seq 1 "$BENCH_RUNS"); do
              start=$(python3 -c 'import time; print(time.time())')
              ./target/release/mqjs "$script" > /dev/null 2>&1
              end=$(python3 -c 'import time; print(time.time())')
              elapsed=$(python3 -c "print($end - $start)")
              rust_total=$(python3 -c "print($rust_total + $elapsed)")
            done
            rust_time=$(python3 -c "print(f'{$rust_total / $BENCH_RUNS:.4f}')")

            if [ -n "${C_BIN:-}" ]; then
              c_total=0
              for i in $(seq 1 "$BENCH_RUNS"); do
                start=$(python3 -c 'import time; print(time.time())')
                "$C_BIN" "$script" > /dev/null 2>&1
                end=$(python3 -c 'import time; print(time.time())')
                elapsed=$(python3 -c "print($end - $start)")
                c_total=$(python3 -c "print($c_total + $elapsed)")
              done
              c_time=$(python3 -c "print(f'{$c_total / $BENCH_RUNS:.4f}')")
              ratio=$(python3 -c "print(f'{$rust_time / $c_time:.2f}x' if $c_time > 0 else 'N/A')")
              echo "| $name | $rust_time | $c_time | $ratio |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | $rust_time | Rust-only |" >> $GITHUB_STEP_SUMMARY
            fi
          done
